# Production-style override: adds nginx reverse proxy with TLS.
# For local Docker Desktop on Windows, keep the base compose (no nginx) and access:
#   API:      http://localhost:4000/api
#   BackOffice: http://localhost:3000
#
# On a Linux VPS, use this override:
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d

services:
  nginx:
    image: nginx:alpine
    container_name: gelato-nginx
    restart: unless-stopped
    depends_on:
      - api
      - backoffice
    environment:
      - API_PORT=${API_PORT:-4000}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/letsencrypt:/etc/letsencrypt:ro
    networks:
      - gelato-network
