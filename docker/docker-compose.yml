services:
  postgres:
    image: postgres:16
    container_name: gelato_pg
    environment:
      POSTGRES_USER: gelato_owner
      POSTGRES_PASSWORD: owner_pw
      # DB dedicado do projeto (nome genérico 'gelato' colide com outros processos locais).
      POSTGRES_DB: gelato_c0
    ports:
      - "5432:5432"
    volumes:
      - gelato_pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gelato_owner -d gelato_c0"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  gelato_pg_data:
